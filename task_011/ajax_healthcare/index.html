<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Healthcare - Appointment System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Loading Spinner Overlay -->
    <div id="loading-spinner" class="spinner-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Header Section -->
    <header class="app-header fade-in-down">
        <div class="header-content">
            <div class="health-icon-wrapper">
                <svg class="health-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
            </div>
            <div class="header-titles">
                <h1>Patient Appointment Management System</h1>
                <p>Manage patient appointments efficiently</p>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Form Section -->
        <div class="card form-card fade-in">
            <div class="card-header">
                <h2 id="form-title">Book Appointment</h2>
            </div>

            <form id="appointment-form">
                <input type="hidden" id="csrf_token" name="csrf_token">
                <input type="hidden" id="appointment_id" name="id">

                <div class="form-group">
                    <label for="patient_name">Patient Name</label>
                    <input type="text" id="patient_name" name="patient_name" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="text" id="mobile" name="mobile" required minlength="10" maxlength="15" placeholder="+1 234 567 8900">
                </div>

                <div class="form-group">
                    <label for="doctor_name">Select Doctor</label>
                    <div class="select-wrapper">
                        <select id="doctor_name" name="doctor_name" required>
                            <option value="">Choose...</option>
                            <option value="Dr. Smith (Cardiology)">Dr. Smith (Cardiology)</option>
                            <option value="Dr. Jones (Neurology)">Dr. Jones (Neurology)</option>
                            <option value="Dr. Patel (Pediatrics)">Dr. Patel (Pediatrics)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="appointment_date">Appointment Date</label>
                        <input type="date" id="appointment_date" name="appointment_date" required>
                    </div>

                    <div class="form-group">
                        <label for="appointment_time">Time</label>
                        <input type="time" id="appointment_time" name="appointment_time" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn" class="btn-primary">Save Appointment</button>
                    <button type="button" id="cancel-btn" class="btn-cancel" onclick="resetForm()">Cancel Edit</button>
                </div>
            </form>
        </div>

        <!-- List Section -->
        <div class="card list-card fade-in-up">
            <div class="card-header">
                <h2>Appointment List</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patient Info</th>
                            <th>Doctor</th>
                            <th>Date & Time</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appointment-list">
                        <!-- Data will be loaded here via AJAX -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
